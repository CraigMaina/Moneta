<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#E8474B" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Moneta" />
    <meta
      name="description"
      content="Moneta: safe-to-spend money manager for Kenya. Paste an M-PESA message, know what you can spend today."
    />
    <title>Moneta</title>
    <script>
      // Apply the saved theme before first paint to avoid a light-theme flash.
      // Mirrors src/features/settings/themeStore.ts (keep the key in sync).
      (function () {
        try {
          var t = localStorage.getItem('moneta-theme')
          if (t === 'light' || t === 'dark') document.documentElement.setAttribute('data-theme', t)
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
